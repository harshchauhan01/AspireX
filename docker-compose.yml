services:

  # ──────────────────────────────────────────────────────────────
  # Redis  (Django Channels channel layer + general cache)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Django  (ASGI via Daphne – handles HTTP + WebSocket)
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override Redis host so it resolves inside Docker network
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      # Persist user-uploaded media files across container restarts
      - media_files:/app/media
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ──────────────────────────────────────────────────────────────
  # React frontend  (Nginx – serves SPA + reverse-proxies to backend)
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bake the API base URL into the Vite bundle at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  media_files:
